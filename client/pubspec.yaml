name: kvitteringsapp
description: "Receipt scanner app for tracking grocery spending"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & networking
  dio: ^5.4.0

  # State management
  provider: ^6.1.0

  # Auth & secure storage
  flutter_secure_storage: ^9.0.0

  # Camera & image picking
  image_picker: ^1.0.0

  # Navigation
  go_router: ^14.0.0

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0

  # JSON serialization
  json_annotation: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
